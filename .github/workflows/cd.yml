name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  release-artifacts:
    name: Build & Publish Artifacts
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build production bundles
        run: pnpm run build
        env:
          DASHSCOPE_API_KEY: cd-placeholder-not-a-real-key
          NEXT_TELEMETRY_DISABLED: 1

      - name: Verify build outputs
        run: |
          test -d apps/api/dist
          test -d apps/web/.next
          test -f apps/web/.next/BUILD_ID
          test -d packages/shared/dist

      - name: Stage artifacts (gitignore-safe paths)
        run: bash .github/scripts/stage-artifacts.sh artifact-output

      - name: Upload API build
        uses: actions/upload-artifact@v4
        with:
          name: persist-api-dist
          path: artifact-output/api/
          if-no-files-found: error

      - name: Upload workspace packages
        uses: actions/upload-artifact@v4
        with:
          name: persist-packages-dist
          path: artifact-output/packages/
          if-no-files-found: error

      - name: Upload Next.js build
        uses: actions/upload-artifact@v4
        with:
          name: persist-web-next
          path: artifact-output/web-next/
          if-no-files-found: error
